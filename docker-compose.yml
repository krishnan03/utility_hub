version: '3.8'

services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - app-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=104857600
      - FILE_CLEANUP_INTERVAL=3600000
      - FILE_MAX_AGE=86400000
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    networks:
      - app-network

volumes:
  uploads:

networks:
  app-network:
    driver: bridge
