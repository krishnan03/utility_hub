version: '3.8'

services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - app-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=104857600
      - FILE_CLEANUP_INTERVAL=3600000
      - FILE_MAX_AGE=86400000
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    networks:
      - app-network

  # ── Analytics (Umami — privacy-first, cookie-free) ─────────────────
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: postgresql://umami:umami_pass@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:-toolspilot-analytics-secret-change-me}
      BASE_PATH: /analytics
    depends_on:
      umami-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  umami-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami_pass
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

volumes:
  uploads:
  umami-db-data:

networks:
  app-network:
    driver: bridge
