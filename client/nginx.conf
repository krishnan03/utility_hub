server {
    listen 80;
    server_name toolspilot.work www.toolspilot.work localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets aggressively (Vite hashes filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No-cache for HTML shell — ensures crawlers and users always get fresh meta tags
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Cache SVG/image assets for 30 days
    location ~* \.(svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Umami Analytics ──────────────────────────────────────────────
    # Dashboard UI (strip /analytics/ prefix → proxy to Umami root)
    location /analytics/ {
        proxy_pass http://umami:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Umami Next.js assets (dashboard loads these at /_next/*)
    location /_next/ {
        proxy_pass http://umami:3000/_next/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Umami tracking script
    location = /script.js {
        proxy_pass http://umami:3000/script.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Umami event collection
    location = /api/send {
        proxy_pass http://umami:3000/api/send;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Umami dashboard API routes (auth, stats, config)
    location /api/auth/ {
        proxy_pass http://umami:3000/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/me {
        proxy_pass http://umami:3000/api/me;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/websites {
        proxy_pass http://umami:3000/api/websites;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/config {
        proxy_pass http://umami:3000/api/config;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/heartbeat {
        proxy_pass http://umami:3000/api/heartbeat;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Proxy API requests to the server container
    location /api/ {
        proxy_pass http://server:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
        proxy_read_timeout 120s;
    }

    # Serve llms.txt with plain text content type for AI crawlers
    location = /llms.txt {
        default_type text/plain;
        try_files $uri =404;
    }

    # Serve robots.txt
    location = /robots.txt {
        default_type text/plain;
        try_files $uri =404;
    }

    # Serve sitemap.xml
    location = /sitemap.xml {
        default_type application/xml;
        add_header Content-Type "application/xml; charset=UTF-8";
        try_files $uri =404;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
